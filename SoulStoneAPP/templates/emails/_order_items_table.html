<div style="margin:20px 0 4px;">
  <div style="font-size:11px; text-transform:uppercase; letter-spacing:1px; color:#876521; font-weight:bold; margin-bottom:10px;">Order Items</div>
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="font-size:14px; color:#1A160F;">
    {% for item in order.items.all %}
    <tr>
      <td style="padding:12px 0; border-bottom:1px solid rgba(26,22,15,0.08); vertical-align:top;">
        <strong>{{ item.product_name }}</strong><br />
        <span style="font-size:12px; color:#8A7B6C;">Qty: {{ item.quantity }} &times; Rs. {{ item.product_price|floatformat:0 }}</span>
      </td>
      <td style="padding:12px 0; border-bottom:1px solid rgba(26,22,15,0.08); text-align:right; font-weight:bold; vertical-align:top; white-space:nowrap;">Rs. {{ item.line_total|floatformat:0 }}</td>
    </tr>
    {% endfor %}
  </table>
</div>
