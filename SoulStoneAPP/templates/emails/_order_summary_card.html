<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="border:1px solid rgba(26,22,15,0.12); border-radius:10px; margin:18px 0;">
  <tr>
    <td style="padding:20px 22px;">
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="font-size:14px; color:#1A160F;">
        <tr>
          <td style="padding:6px 0; color:#8A7B6C;">Order Number</td>
          <td style="padding:6px 0; text-align:right; font-weight:bold;">#{{ order.order_number }}</td>
        </tr>
        <tr>
          <td style="padding:6px 0; color:#8A7B6C;">Order Date</td>
          <td style="padding:6px 0; text-align:right;">{{ order.created_at|date:"j F Y" }}</td>
        </tr>
        <tr>
          <td style="padding:6px 0; color:#8A7B6C;">Payment Status</td>
          <td style="padding:6px 0; text-align:right;">{{ order.get_payment_status_display }}</td>
        </tr>
        <tr>
          <td style="padding:6px 0; color:#8A7B6C;">Order Status</td>
          <td style="padding:6px 0; text-align:right;">{{ order.get_order_status_display }}</td>
        </tr>
        <tr>
          <td style="padding:12px 0 0; border-top:1px solid rgba(26,22,15,0.1); font-weight:bold; font-size:15px;">Total Amount</td>
          <td style="padding:12px 0 0; border-top:1px solid rgba(26,22,15,0.1); text-align:right; font-weight:bold; font-size:15px; color:#876521;">Rs. {{ order.total_amount|floatformat:0 }}</td>
        </tr>
      </table>
    </td>
  </tr>
</table>
